<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="80" r="200" fill="rgba(255,255,255,0.08)" filter="url(#blur)"/>
  <circle cx="100" cy="500" r="180" fill="rgba(0,0,0,0.15)" filter="url(#blur)"/>
  <circle cx="650" cy="350" r="120" fill="rgba(255,165,0,0.12)" filter="url(#blur)"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Main card -->
  <rect x="80" y="80" width="680" height="470" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Category badge -->
  <rect x="112" y="112" width="220" height="36" rx="18" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="222" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">💰 YouTube Monetization</text>

  <!-- Main emoji -->
  <text x="130" y="260" font-size="90" font-family="system-ui">💰</text>

  <!-- Title -->
  <text x="112" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="white" letter-spacing="-0.5">How to Monetize Your</text>
  <text x="112" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="white" letter-spacing="-0.5">YouTube Channel in 2026</text>

  <!-- Subtitle line -->
  <rect x="112" y="392" width="60" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>

  <!-- Description -->
  <text x="112" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="rgba(255,255,255,0.85)">7 revenue streams beyond AdSense</text>
  <text x="112" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="rgba(255,255,255,0.85)">that top creators use to scale to $10K/mo</text>

  <!-- Author -->
  <circle cx="130" cy="512" r="18" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <text x="130" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">S</text>
  <text x="158" y="509" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">Sandeep Singh</text>
  <text x="158" y="527" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Co-founder, Graphy.com</text>

  <!-- Right side illustration -->
  <!-- YouTube play button -->
  <rect x="840" y="150" width="280" height="170" rx="20" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="980" cy="235" r="45" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="968,215 968,255 1008,235" fill="white"/>
  <text x="980" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">Watch &amp; Earn</text>

  <!-- Money stats cards -->
  <rect x="840" y="350" width="120" height="80" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="900" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle">$10K</text>
  <text x="900" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Per Month</text>
  <text x="900" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">Goal</text>

  <rect x="1000" y="350" width="120" height="80" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="1060" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#4ade80" text-anchor="middle">7x</text>
  <text x="1060" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Revenue</text>
  <text x="1060" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">Streams</text>

  <!-- Graphy branding -->
  <rect x="840" y="480" width="280" height="50" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="980" y="511" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle">🚀 creatorlaunchpad.graphy.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="605" width="1200" height="25" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="622" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">Creator Launchpad by Graphy.com · For YouTube Creators Who Want to Monetize</text>
</svg>
