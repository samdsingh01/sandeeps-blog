<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="200" cy="100" r="250" fill="rgba(255,255,255,0.06)" filter="url(#blur)"/>
  <circle cx="1050" cy="530" r="200" fill="rgba(0,0,0,0.15)" filter="url(#blur)"/>
  <circle cx="700" cy="300" r="150" fill="rgba(139,92,246,0.2)" filter="url(#blur)"/>

  <!-- Dot pattern -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1.5" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Main card -->
  <rect x="80" y="80" width="680" height="470" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Category badge -->
  <rect x="112" y="112" width="185" height="36" rx="18" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="204" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">🎓 Course Creation</text>

  <!-- Step numbers decorative -->
  <circle cx="135" cy="230" r="28" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="135" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">1</text>
  <circle cx="205" cy="230" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <text x="205" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="rgba(255,255,255,0.6)" text-anchor="middle">2</text>
  <circle cx="275" cy="230" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <text x="275" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="rgba(255,255,255,0.6)" text-anchor="middle">3</text>

  <!-- Title -->
  <text x="112" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-0.5">How to Create &amp; Sell</text>
  <text x="112" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-0.5">Your First Online Course</text>

  <!-- Subtitle line -->
  <rect x="112" y="372" width="60" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>

  <!-- Description -->
  <text x="112" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="rgba(255,255,255,0.85)">Turn your YouTube audience into paying</text>
  <text x="112" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="rgba(255,255,255,0.85)">students — complete step-by-step guide</text>

  <!-- Author -->
  <circle cx="130" cy="497" r="18" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <text x="130" y="503" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">S</text>
  <text x="158" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">Sandeep Singh</text>
  <text x="158" y="512" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Co-founder, Graphy.com</text>

  <!-- Right side - course mockup -->
  <rect x="830" y="130" width="300" height="200" rx="16" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Course header -->
  <rect x="830" y="130" width="300" height="50" rx="16" fill="rgba(255,255,255,0.1)"/>
  <rect x="830" y="155" width="300" height="25" fill="rgba(255,255,255,0.1)"/>
  <circle cx="860" cy="155" r="12" fill="#4ade80"/>
  <text x="860" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">▶</text>
  <text x="910" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white">Your Course</text>

  <!-- Progress bars in course -->
  <rect x="850" y="200" width="200" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="850" y="200" width="160" height="8" rx="4" fill="#4ade80"/>
  <text x="850" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Module 1: Introduction</text>
  <rect x="850" y="235" width="200" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="850" y="235" width="100" height="8" rx="4" fill="#a78bfa"/>
  <text x="850" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Module 2: Core Content</text>
  <rect x="850" y="270" width="200" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="850" y="270" width="60" height="8" rx="4" fill="#f9a8d4"/>
  <text x="850" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Module 3: Advanced</text>

  <!-- Revenue stat -->
  <rect x="830" y="360" width="140" height="100" rx="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="900" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#4ade80" text-anchor="middle">$497</text>
  <text x="900" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Avg. Course Price</text>
  <text x="900" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">on Graphy</text>

  <rect x="990" y="360" width="140" height="100" rx="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="1060" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#f9a8d4" text-anchor="middle">10K+</text>
  <text x="1060" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Creators Use</text>
  <text x="1060" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">Graphy</text>

  <!-- Graphy branding -->
  <rect x="830" y="490" width="300" height="50" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="980" y="521" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle">🚀 Build on Graphy.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="605" width="1200" height="25" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="622" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">Creator Launchpad by Graphy.com · Turn Your Knowledge Into Income</text>
</svg>
