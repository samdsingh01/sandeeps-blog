<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Neural network bg dots -->
  <circle cx="300" cy="200" r="300" fill="rgba(129,140,248,0.07)" filter="url(#blur)"/>
  <circle cx="1000" cy="400" r="250" fill="rgba(192,132,252,0.08)" filter="url(#blur)"/>
  <circle cx="600" cy="600" r="200" fill="rgba(99,102,241,0.06)" filter="url(#blur)"/>

  <!-- Star/sparkle particles -->
  <circle cx="200" cy="80" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="450" cy="50" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="750" cy="100" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="1100" cy="150" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1050" cy="300" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="900" cy="580" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="350" cy="560" r="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Main card -->
  <rect x="80" y="80" width="680" height="470" rx="24" fill="url(#card)" stroke="rgba(129,140,248,0.3)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Category badge -->
  <rect x="112" y="112" width="175" height="36" rx="18" fill="rgba(129,140,248,0.25)" stroke="rgba(129,140,248,0.5)" stroke-width="1"/>
  <text x="199" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">🤖 AI for Creators</text>

  <!-- AI brain/robot icon -->
  <text x="112" y="240" font-size="80" font-family="system-ui">🤖</text>

  <!-- Glowing accent line -->
  <rect x="112" y="255" width="200" height="2" rx="1" fill="url(#glow)" opacity="0.7"/>

  <!-- Title -->
  <text x="112" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="35" font-weight="800" fill="white" letter-spacing="-0.5">Best AI Tools for</text>
  <text x="112" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="35" font-weight="800" fill="white" letter-spacing="-0.5">Content Creators 2026</text>

  <rect x="112" y="362" width="60" height="4" rx="2" fill="url(#glow)"/>

  <text x="112" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="rgba(255,255,255,0.85)">Write, edit, design and publish 10x faster</text>
  <text x="112" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="rgba(255,255,255,0.85)">with the top AI tools reviewed &amp; ranked</text>

  <!-- Author -->
  <circle cx="130" cy="492" r="18" fill="rgba(129,140,248,0.3)" stroke="rgba(129,140,248,0.6)" stroke-width="2"/>
  <text x="130" y="498" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">S</text>
  <text x="158" y="489" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">Sandeep Singh</text>
  <text x="158" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Co-founder, Graphy.com</text>

  <!-- Right side - AI tool cards -->
  <!-- Tool 1 -->
  <rect x="830" y="120" width="300" height="65" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(129,140,248,0.3)" stroke-width="1"/>
  <circle cx="862" cy="152" r="18" fill="rgba(129,140,248,0.3)"/>
  <text x="862" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="16" text-anchor="middle">✍️</text>
  <text x="892" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white">AI Writing</text>
  <text x="892" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Scripts · Titles · Descriptions</text>
  <rect x="1090" y="142" width="30" height="20" rx="10" fill="#4ade80"/>
  <text x="1105" y="157" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" font-weight="700" text-anchor="middle">10x</text>

  <!-- Tool 2 -->
  <rect x="830" y="200" width="300" height="65" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
  <circle cx="862" cy="232" r="18" fill="rgba(192,132,252,0.3)"/>
  <text x="862" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="16" text-anchor="middle">🎨</text>
  <text x="892" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white">AI Design</text>
  <text x="892" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Thumbnails · Banners · Art</text>
  <rect x="1090" y="222" width="30" height="20" rx="10" fill="#c084fc"/>
  <text x="1105" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" font-weight="700" text-anchor="middle">AI</text>

  <!-- Tool 3 -->
  <rect x="830" y="280" width="300" height="65" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
  <circle cx="862" cy="312" r="18" fill="rgba(251,191,36,0.2)"/>
  <text x="862" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="16" text-anchor="middle">🎬</text>
  <text x="892" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white">AI Video Editing</text>
  <text x="892" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Auto-cut · Captions · B-roll</text>
  <rect x="1090" y="302" width="30" height="20" rx="10" fill="#fbbf24"/>
  <text x="1105" y="317" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" font-weight="700" text-anchor="middle">New</text>

  <!-- Tool 4 -->
  <rect x="830" y="360" width="300" height="65" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <circle cx="862" cy="392" r="18" fill="rgba(52,211,153,0.2)"/>
  <text x="862" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="16" text-anchor="middle">📊</text>
  <text x="892" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white">AI Analytics</text>
  <text x="892" y="406" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Insights · Trends · Strategy</text>
  <rect x="1090" y="382" width="30" height="20" rx="10" fill="#34d399"/>
  <text x="1105" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" font-weight="700" text-anchor="middle">Pro</text>

  <!-- Graphy branding -->
  <rect x="830" y="455" width="300" height="50" rx="12" fill="rgba(129,140,248,0.1)" stroke="rgba(129,140,248,0.2)" stroke-width="1"/>
  <text x="980" y="486" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle">🚀 creatorlaunchpad.graphy.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="605" width="1200" height="25" fill="rgba(0,0,0,0.4)"/>
  <text x="600" y="622" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">Creator Launchpad by Graphy.com · AI Tools for Modern Creators</text>
</svg>
